[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Fonctions planifiées ──────────────────────────────────────────────────────
[functions."send-reminders"]
  schedule = "*/30 * * * *"

[functions."send-queue"]
  schedule = "*/5 * * * *"

[functions."backup"]
  schedule = "0 2 * * *"

# ── Redirections domaine ──────────────────────────────────────────────────────
[[redirects]]
  from   = "https://zowe.netlify.app/*"
  to     = "https://zowekine.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.zowekine.com/*"
  to     = "https://zowekine.com/:splat"
  status = 301
  force  = true

# ── Protection fichiers sources ───────────────────────────────────────────────
[[redirects]]
  from   = "/src/*"
  to     = "/404"
  status = 404
  force  = true

# ── Headers de sécurité HTTP (toutes les pages) ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://api.mapbox.com https://identity.netlify.com https://www.google.com https://www.gstatic.com https://www.recaptcha.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.mapbox.com https://maps.googleapis.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://api.mapbox.com https://events.mapbox.com https://formspree.io https://www.recaptcha.net https://translate.googleapis.com; frame-src https://maps.google.com https://www.google.com; worker-src blob:; child-src blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"

# ── Admin — CSP élargie pour Decap CMS (React + eval) ────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Content-Security-Policy = "default-src 'self' 'unsafe-eval' 'unsafe-inline' https: data: blob:; frame-ancestors 'none'"
