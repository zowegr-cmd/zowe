backend:
  name: git-gateway
  branch: main

locale: fr
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - label: "Accueil — Hero"
        name: "hero"
        file: "src/content/hero.json"
        format: json
        fields:
          - label: "Texte au-dessus du titre"
            name: "label"
            widget: "string"
            hint: "Ex : Kinésithérapeute — Rhode-Saint-Genèse"
          - label: "Titre principal"
            name: "title"
            widget: "string"
            hint: "Votre nom professionnel affiché en grand"
          - label: "Accroche"
            name: "tagline"
            widget: "text"
            hint: "Utilisez une nouvelle ligne pour un retour à la ligne"
          - label: "Texte du bouton"
            name: "cta"
            widget: "string"

      - label: "Parcours"
        name: "about"
        file: "src/content/about.json"
        format: json
        fields:
          - label: "Phrase d'accroche (en bordeaux)"
            name: "lead"
            widget: "string"
          - label: "Paragraphe 1"
            name: "paragraph1"
            widget: "text"
          - label: "Paragraphe 2"
            name: "paragraph2"
            widget: "text"
          - label: "Citation (encadré)"
            name: "quote"
            widget: "string"
            hint: "Apparaît dans le cadre bordeaux à droite"
          - label: "Ecole / Universite"
            name: "school"
            widget: "string"
          - label: "Diplome"
            name: "degree"
            widget: "string"

      - label: "Soins"
        name: "services"
        file: "src/content/services.json"
        format: json
        fields:
          - label: "Introduction"
            name: "intro"
            widget: "string"
          - label: "Liste des soins"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - label: "Nom du soin"
                name: "name"
                widget: "string"
              - label: "Sous-titre (optionnel)"
                name: "subtitle"
                widget: "string"
                required: false
                default: ""
                hint: "Ex : Adultes, enfants & nourrissons"

      - label: "Infos pratiques"
        name: "infos"
        file: "src/content/infos.json"
        format: json
        fields:
          - label: "Nom du cabinet"
            name: "cabinet"
            widget: "string"
          - label: "Description du cabinet"
            name: "cabinetText"
            widget: "string"
          - label: "Zones de deplacement"
            name: "zones"
            widget: "string"
            hint: "Separees par · (ex : Ville A · Ville B)"
          - label: "Titre tarification"
            name: "tarifsTitle"
            widget: "string"
            hint: "Ex : Non-conventionne"
          - label: "Texte tarification"
            name: "tarifsText"
            widget: "text"
          - label: "Telephone"
            name: "phone"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "N° d'entreprise (BCE)"
            name: "entreprise"
            widget: "string"
            required: false
            hint: "Ex : BE 0123.456.789"
          - label: "N° INAMI"
            name: "inami"
            widget: "string"
            required: false
            hint: "Numéro d'identification INAMI"
          - label: "Assurance RC Professionnelle"
            name: "rcpro"
            widget: "string"
            required: false
            hint: "Nom de l'assureur et numéro de police"

      - label: "Galerie photos"
        name: "gallery"
        file: "src/content/gallery.json"
        format: json
        fields:
          - label: "Galerie visible sur le site"
            name: "visible"
            widget: "boolean"
            default: false
            hint: "Activez pour afficher la galerie (aperçu accueil + page /galerie)"
          - label: "Titre FR"
            name: "title_fr"
            widget: "string"
          - label: "Titre NL"
            name: "title_nl"
            widget: "string"
            required: false
          - label: "Titre EN"
            name: "title_en"
            widget: "string"
            required: false
          - label: "Introduction FR"
            name: "intro_fr"
            widget: "text"
          - label: "Introduction NL"
            name: "intro_nl"
            widget: "text"
            required: false
          - label: "Introduction EN"
            name: "intro_en"
            widget: "text"
            required: false
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.title_fr}}"
            fields:
              - label: "Photo"
                name: "image"
                widget: "image"
              - label: "Titre FR"
                name: "title_fr"
                widget: "string"
              - label: "Titre NL"
                name: "title_nl"
                widget: "string"
                required: false
              - label: "Titre EN"
                name: "title_en"
                widget: "string"
                required: false
              - label: "Description FR"
                name: "description_fr"
                widget: "text"
              - label: "Description NL"
                name: "description_nl"
                widget: "text"
                required: false
              - label: "Description EN"
                name: "description_en"
                widget: "text"
                required: false
              - label: "Protocole utilisé"
                name: "protocol"
                widget: "string"
                required: false
                hint: "Ex : Deep tissue · IASTM · Vacuothérapie"

      - label: "Avant votre première séance"
        name: "session"
        file: "src/content/session.json"
        format: json
        fields:
          - label: "Page visible sur le site"
            name: "visible"
            widget: "boolean"
            default: false
            hint: "Activez pour afficher le lien dans le footer, la page /merci et l'email patient"
          - label: "Titre FR"
            name: "title_fr"
            widget: "string"
          - label: "Titre NL"
            name: "title_nl"
            widget: "string"
            required: false
          - label: "Titre EN"
            name: "title_en"
            widget: "string"
            required: false
          - label: "Comment venir FR"
            name: "howToGet_fr"
            widget: "text"
          - label: "Comment s'habiller FR"
            name: "dress_fr"
            widget: "text"
          - label: "Durée selon protocole FR"
            name: "duration_fr"
            widget: "text"
          - label: "Ce qu'il faut apporter FR"
            name: "bring_fr"
            widget: "text"
          - label: "Paiement FR"
            name: "payment_fr"
            widget: "text"
          - label: "Étapes du déroulé"
            name: "steps"
            widget: "list"
            summary: "{{fields.label_fr}}"
            fields:
              - label: "Intitulé FR"
                name: "label_fr"
                widget: "string"
              - label: "Intitulé NL"
                name: "label_nl"
                widget: "string"
                required: false
              - label: "Intitulé EN"
                name: "label_en"
                widget: "string"
                required: false
              - label: "Texte FR"
                name: "text_fr"
                widget: "text"
              - label: "Texte NL"
                name: "text_nl"
                widget: "text"
                required: false
              - label: "Texte EN"
                name: "text_en"
                widget: "text"
                required: false

      - label: "Formulaire de contact"
        name: "contact"
        file: "src/content/contact.json"
        format: json
        fields:
          - label: "Texte d'introduction"
            name: "intro"
            widget: "text"
          - label: "ID Formspree"
            name: "formspreeId"
            widget: "string"
            hint: "Creez un compte sur formspree.io, creez un formulaire, puis copiez l'ID ici (ex : xrgvepxq)"

      - label: "Parametres generaux"
        name: "meta"
        file: "src/content/meta.json"
        format: json
        fields:
          - label: "Titre du site (onglet navigateur)"
            name: "siteTitle"
            widget: "string"
          - label: "Description SEO"
            name: "description"
            widget: "text"
            hint: "Texte affiché dans les résultats Google"
          - label: "Annee copyright (footer)"
            name: "copyright"
            widget: "string"
          - label: "URL du site (pour la redirection apres formulaire)"
            name: "siteUrl"
            widget: "string"
            required: false
            hint: "A remplir une fois le site en ligne. Ex : https://zowe.netlify.app (sans slash final)"
