backend:
  name: git-gateway
  branch: main

locale: fr
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "contenu"
    label: "Contenu du site"
    files:

      - label: "Accueil — Hero"
        name: "hero"
        file: "src/content/hero.json"
        format: json
        fields:
          - label: "Sous-titre spécialité"
            name: "label"
            widget: "object"
            collapsed: false
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Titre principal"
            name: "title"
            widget: "string"
            hint: "Affiché en grand — même dans toutes les langues"
          - label: "Accroche (tagline)"
            name: "tagline"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Bouton principal"
            name: "cta"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }

      - label: "Parcours — Qui suis-je"
        name: "about"
        file: "src/content/about.json"
        format: json
        fields:
          - label: "Photo"
            name: "image"
            widget: "image"
            required: false
          - label: "Titre de section"
            name: "title"
            widget: "object"
            collapsed: false
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Phrase d'accroche"
            name: "lead"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Paragraphe 1"
            name: "paragraph1"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "text" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
          - label: "Paragraphe 2"
            name: "paragraph2"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "text" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
          - label: "Paragraphe 3"
            name: "paragraph3"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "text" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
          - { label: "École / Université", name: "school", widget: "string" }
          - { label: "Diplôme",            name: "degree", widget: "string" }

      - label: "L'Expérience BELTRA"
        name: "experience"
        file: "src/content/experience.json"
        format: json
        fields:
          - label: "Titre de section"
            name: "title"
            widget: "object"
            collapsed: false
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Sous-titre"
            name: "subtitle"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Introduction"
            name: "intro"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "text" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
          - label: "Les 3 blocs"
            name: "blocks"
            widget: "list"
            summary: "{{fields.title.fr}}"
            fields:
              - label: "Titre du bloc"
                name: "title"
                widget: "object"
                collapsed: false
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "string" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
              - label: "Texte du bloc"
                name: "text"
                widget: "object"
                collapsed: true
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "text" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }

      - label: "Protocoles & Investissements"
        name: "services"
        file: "src/content/services.json"
        format: json
        fields:
          - label: "Titre de section"
            name: "title"
            widget: "object"
            collapsed: false
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Introduction"
            name: "intro"
            widget: "object"
            collapsed: true
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "string" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
          - label: "Les 3 protocoles"
            name: "tiers"
            widget: "list"
            summary: "{{fields.name.fr}}"
            fields:
              - { label: "ID (ne pas modifier)", name: "id", widget: "string" }
              - { label: "Durée", name: "duration", widget: "string" }
              - { label: "Prix", name: "price", widget: "string" }
              - label: "Nom du protocole"
                name: "name"
                widget: "object"
                collapsed: false
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "string" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
              - label: "Tagline"
                name: "tagline"
                widget: "object"
                collapsed: true
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "string" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
              - label: "Description"
                name: "description"
                widget: "object"
                collapsed: true
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "text" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
              - label: "Outils du protocole"
                name: "tools"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "🇫🇷 Outils (FR)", name: "fr", widget: "list" }
                  - { label: "🇧🇪 Outils (NL)", name: "nl", widget: "list", required: false }
                  - { label: "🇬🇧 Outils (EN)", name: "en", widget: "list", required: false }
              - label: "Idéal pour"
                name: "ideal"
                widget: "object"
                collapsed: true
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "string" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }

      - label: "FAQ"
        name: "faq"
        file: "src/content/faq.json"
        format: json
        fields:
          - label: "Questions & Réponses"
            name: "items"
            widget: "list"
            summary: "{{fields.question.fr}}"
            fields:
              - label: "Question"
                name: "question"
                widget: "object"
                collapsed: false
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "string" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "string", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "string", required: false }
              - label: "Réponse"
                name: "answer"
                widget: "object"
                collapsed: true
                summary: "{{fields.fr}}"
                fields:
                  - { label: "🇫🇷 Français", name: "fr", widget: "text" }
                  - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
                  - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }

      - label: "Formulaire de contact"
        name: "contact"
        file: "src/content/contact.json"
        format: json
        fields:
          - label: "Texte d'introduction"
            name: "intro"
            widget: "object"
            collapsed: false
            summary: "{{fields.fr}}"
            fields:
              - { label: "🇫🇷 Français", name: "fr", widget: "text" }
              - { label: "🇧🇪 Néerlandais", name: "nl", widget: "text", required: false }
              - { label: "🇬🇧 Anglais",    name: "en", widget: "text", required: false }
          - label: "ID Formspree"
            name: "formspreeId"
            widget: "string"
            hint: "Créez un compte sur formspree.io et copiez l'ID ici (ex : xrgvepxq)"

      - label: "Infos pratiques"
        name: "infos"
        file: "src/content/infos.json"
        format: json
        fields:
          - { label: "Nom du cabinet", name: "cabinet", widget: "string" }
          - { label: "Description du cabinet", name: "cabinetText", widget: "string" }
          - { label: "Adresse (rue)", name: "address", widget: "string" }
          - { label: "Ville et code postal", name: "city", widget: "string" }
          - { label: "Zones de déplacement", name: "zones", widget: "string", hint: "Séparées par · (ex : Ville A · Ville B)" }
          - { label: "Titre tarification", name: "tarifsTitle", widget: "string" }
          - { label: "Téléphone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Horaires", name: "hours", widget: "string", hint: "Ex : Lun–Ven 8h–19h · Sam 9h–14h" }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "N° d'entreprise (BCE)", name: "entreprise", widget: "string", required: false }
          - { label: "N° INAMI", name: "inami", widget: "string", required: false }
          - { label: "Assurance RC Professionnelle", name: "rcpro", widget: "string", required: false }

      - label: "Galerie photos"
        name: "gallery"
        file: "src/content/gallery.json"
        format: json
        fields:
          - { label: "Galerie visible sur le site", name: "visible", widget: "boolean", default: false }
          - label: "Titre de la galerie"
            name: "title_fr"
            widget: "string"
          - { label: "Titre NL", name: "title_nl", widget: "string", required: false }
          - { label: "Titre EN", name: "title_en", widget: "string", required: false }
          - { label: "Introduction FR", name: "intro_fr", widget: "text" }
          - { label: "Introduction NL", name: "intro_nl", widget: "text", required: false }
          - { label: "Introduction EN", name: "intro_en", widget: "text", required: false }
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.title_fr}}"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Titre FR", name: "title_fr", widget: "string" }
              - { label: "Titre NL", name: "title_nl", widget: "string", required: false }
              - { label: "Titre EN", name: "title_en", widget: "string", required: false }
              - { label: "Description FR", name: "description_fr", widget: "text" }
              - { label: "Description NL", name: "description_nl", widget: "text", required: false }
              - { label: "Description EN", name: "description_en", widget: "text", required: false }
              - { label: "Protocole utilisé", name: "protocol", widget: "string", required: false }

      - label: "Avant votre première séance"
        name: "session"
        file: "src/content/session.json"
        format: json
        fields:
          - { label: "Page visible sur le site", name: "visible", widget: "boolean", default: false }
          - { label: "Titre FR", name: "title_fr", widget: "string" }
          - { label: "Titre NL", name: "title_nl", widget: "string", required: false }
          - { label: "Titre EN", name: "title_en", widget: "string", required: false }
          - { label: "Comment venir FR", name: "howToGet_fr", widget: "text" }
          - { label: "Comment venir NL", name: "howToGet_nl", widget: "text", required: false }
          - { label: "Comment venir EN", name: "howToGet_en", widget: "text", required: false }
          - { label: "Comment s'habiller FR", name: "dress_fr", widget: "text" }
          - { label: "Comment s'habiller NL", name: "dress_nl", widget: "text", required: false }
          - { label: "Comment s'habiller EN", name: "dress_en", widget: "text", required: false }
          - { label: "Durée FR", name: "duration_fr", widget: "text" }
          - { label: "Durée NL", name: "duration_nl", widget: "text", required: false }
          - { label: "Durée EN", name: "duration_en", widget: "text", required: false }
          - { label: "Ce qu'il faut apporter FR", name: "bring_fr", widget: "text" }
          - { label: "Ce qu'il faut apporter NL", name: "bring_nl", widget: "text", required: false }
          - { label: "Ce qu'il faut apporter EN", name: "bring_en", widget: "text", required: false }
          - { label: "Paiement FR", name: "payment_fr", widget: "text" }
          - { label: "Paiement NL", name: "payment_nl", widget: "text", required: false }
          - { label: "Paiement EN", name: "payment_en", widget: "text", required: false }
          - label: "Étapes du déroulé"
            name: "steps"
            widget: "list"
            summary: "{{fields.label_fr}}"
            fields:
              - { label: "Intitulé FR", name: "label_fr", widget: "string" }
              - { label: "Intitulé NL", name: "label_nl", widget: "string", required: false }
              - { label: "Intitulé EN", name: "label_en", widget: "string", required: false }
              - { label: "Texte FR", name: "text_fr", widget: "text" }
              - { label: "Texte NL", name: "text_nl", widget: "text", required: false }
              - { label: "Texte EN", name: "text_en", widget: "text", required: false }

      - label: "Témoignages (fallback statique)"
        name: "testimonials"
        file: "src/content/testimonials.json"
        format: json
        fields:
          - label: "Avis clients"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.rating}}★"
            fields:
              - { label: "Prénom et initiale (ex : Marie L.)", name: "name", widget: "string" }
              - label: "Note"
                name: "rating"
                widget: "select"
                options: ["5", "4"]
                default: "5"
              - { label: "Témoignage", name: "text", widget: "text" }
              - { label: "Date (ex : Mars 2025)", name: "date", widget: "string" }

      - label: "Paramètres généraux"
        name: "meta"
        file: "src/content/meta.json"
        format: json
        fields:
          - { label: "Titre du site (onglet navigateur)", name: "siteTitle", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text", hint: "Texte affiché dans les résultats Google" }
          - { label: "Année copyright (footer)", name: "copyright", widget: "string" }
          - { label: "URL du site", name: "siteUrl", widget: "string", required: false, hint: "Ex : https://zowe.netlify.app (sans slash final)" }
